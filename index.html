<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席予約 — STAR LEVEL 外野ライト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text-sub: #666;
    --text-hint: #aaa;
    --blue: #2563eb;
    --blue-light: #dbeafe;
    --green: #16a34a;
    --green-light: #dcfce7;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --gray-seat: #e5e5e5;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  .header { margin-bottom: 24px; }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .name-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .name-field label {
    font-size: 11px; color: var(--text-sub);
    display: block; margin-bottom: 5px; font-weight: 500;
  }
  .name-field input {
    width: 100%; padding: 8px 12px; font-size: 14px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-family: inherit; outline: none; background: var(--bg);
    transition: border-color 0.15s; color: var(--text);
  }
  .name-field input:focus { border-color: var(--blue); background: #fff; }
  .name-hint { font-size: 11px; color: var(--text-hint); margin-top: 8px; }

  .eid-banner {
    background: #f0fdf4;
    border: 1px solid #86efac;
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 13px;
    color: #15803d;
    display: none;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.6;
  }
  .eid-banner.show { display: flex; }

  .map-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    overflow-x: auto;
  }
  .map-direction {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-hint);
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .map-inner { display: flex; gap: 20px; min-width: fit-content; }
  .sec-block { display: flex; flex-direction: column; }
  .sec-label {
    font-size: 11px; font-weight: 700;
    color: var(--text-sub); margin-bottom: 8px; letter-spacing: 0.3px;
  }
  .rows-wrap { display: flex; flex-direction: column; gap: 4px; }
  .row-line { display: flex; align-items: center; gap: 5px; }
  .row-tag {
    font-size: 10px; color: var(--text-hint);
    min-width: 26px; text-align: right; flex-shrink: 0;
  }
  .seats { display: flex; gap: 3px; }
  .seat {
    width: 24px; height: 22px;
    border-radius: 4px; border: none;
    cursor: pointer; font-size: 9px; font-weight: 600;
    transition: transform 0.1s, background 0.15s;
    font-family: inherit;
  }
  .seat:active { transform: scale(0.9); }
  .seat.avail      { background: #dbeafe; color: #1e40af; }
  .seat.avail:hover{ background: #bfdbfe; }
  .seat.taken      { background: #e5e5e5; color: #999; cursor: not-allowed; }
  .seat.mine       { background: #dcfce7; color: #15803d; cursor: pointer; }
  .seat.mine:hover { background: #bbf7d0; }
  .seat.selected   { background: #fef3c7 !important; color: #92400e !important; outline: 2px solid #d97706; outline-offset: 1px; }
  .seat.to-delete  { background: #fee2e2 !important; color: #991b1b !important; outline: 2px solid #dc2626; outline-offset: 1px; }
  .sec-divider { width: 1px; background: var(--border); margin-top: 20px; }

  .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-sub); }
  .leg-dot { width: 14px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  .action-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 24px;
  }
  .sel-info {
    font-size: 12px; color: var(--text-hint);
    min-height: 36px; margin-bottom: 12px; line-height: 1.7;
  }
  .sel-info.has-sel { color: var(--text); }
  .sel-count { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }

  .btn-row { display: flex; gap: 8px; }
  .register-btn {
    flex: 1; padding: 10px;
    font-size: 14px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius);
    transition: background 0.15s, opacity 0.15s;
  }
  .register-btn:hover:not(:disabled) { background: #1d4ed8; }
  .register-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .delete-btn {
    flex: 1; padding: 10px;
    font-size: 14px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    background: var(--red); color: #fff;
    border: none; border-radius: var(--radius);
    transition: background 0.15s, opacity 0.15s;
    display: none;
  }
  .delete-btn.show { display: block; }
  .delete-btn:hover:not(:disabled) { background: #b91c1c; }
  .delete-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1a1a1a; color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .overview-btn {
    display: block; width: 100%;
    padding: 9px; margin-bottom: 12px;
    font-size: 13px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    background: #fff; color: #1a1a1a;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 8px;
    transition: background 0.15s;
  }
  .overview-btn:hover { background: #f5f5f3; }

  .modal-overlay {
    display: none; position: fixed;
    inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px;
    width: 100%; max-width: 98vw;
    padding: 20px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close {
    font-size: 18px; cursor: pointer;
    background: none; border: none;
    color: #666; padding: 4px 8px;
    border-radius: 4px;
  }
  .modal-close:hover { background: #f5f5f3; }
  .modal-direction {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #aaa;
    margin-bottom: 12px;
  }
  .modal-blocks-outer { width: 100%; overflow: hidden; }
  .modal-blocks {
    display: flex; gap: 16px;
    transform-origin: top left;
    white-space: nowrap;
  }
  .modal-sec { flex-shrink: 0; }
  .modal-sec-label {
    font-size: 11px; font-weight: 700;
    color: #666; margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .modal-rows { display: flex; flex-direction: column; gap: 3px; }
  .modal-row { display: flex; align-items: flex-start; gap: 4px; }
  .modal-row-tag {
    font-size: 9px; color: #aaa;
    min-width: 22px; text-align: right;
    padding-top: 3px; flex-shrink: 0;
  }
  .modal-seats { display: flex; gap: 2px; }
  .modal-seat {
    display: flex; flex-direction: column;
    align-items: center; gap: 1px;
    width: 32px;
  }
  .modal-seat-box {
    width: 28px; height: 22px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600;
  }
  .modal-seat-box.avail { background: #dbeafe; color: #1e40af; }
  .modal-seat-box.taken { background: #e5e5e5; color: #666; }
  .modal-seat-box.mine  { background: #dcfce7; color: #15803d; }
  .modal-eid {
    font-size: 7px; color: #666;
    text-align: center; width: 32px;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; line-height: 1.2;
  }
  .modal-legend {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  .modal-stat {
    font-size: 12px; color: #666;
    margin-top: 10px;
  }
  .modal-stat strong { color: #1a1a1a; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">STAR LEVEL 外野ライト — 席予約</div>
    <div class="header-sub">Sec.304〜307 ／ 全180席</div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">接続中...</span>
  </div>

  <div class="name-area">
    <div class="name-field">
      <label>eidを入力してください</label>
      <input type="text" id="eid-input" placeholder="" maxlength="30" oninput="onEidInput()" />
    </div>
    <div class="name-hint" id="name-hint">※ eidを入力してから席を選んでください</div>
    <div class="eid-banner" id="eid-banner">
      <span>✅</span>
      <span id="eid-banner-text"></span>
    </div>
  </div>

  <div class="map-wrap">
    <div class="map-direction">
      <span>◀ 1塁側（Sec.307）</span>
      <span>外野側（Sec.304） ▶</span>
    </div>
    <div class="map-inner" id="map-inner"></div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#dbeafe"></div>空席</div>
      <div class="leg"><div class="leg-dot" style="background:#fef3c7;outline:2px solid #d97706;outline-offset:0"></div>選択中</div>
      <div class="leg"><div class="leg-dot" style="background:#dcfce7"></div>自分の予約</div>
      <div class="leg"><div class="leg-dot" style="background:#fee2e2;outline:2px solid #dc2626;outline-offset:0"></div>削除選択中</div>
      <div class="leg"><div class="leg-dot" style="background:#e5e5e5"></div>予約済み</div>
    </div>
  </div>

  <button class="overview-btn" onclick="openOverview()">📋 全体確認（誰がどこにいるか）</button>

  <div class="action-area">
    <div class="sel-info" id="sel-info">席をクリックして選択してください（複数選択可）</div>
    <div class="btn-row">
      <button class="register-btn" id="register-btn" disabled onclick="reserve()">登録する</button>
      <button class="delete-btn" id="delete-btn" onclick="deleteSelected()">選択した席を削除</button>
    </div>
  </div>

</div>

<!-- 全体確認モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="closeOverviewOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title">全体確認 — 誰がどこにいるか</div>
      <button class="modal-close" onclick="closeOverview()">✕</button>
    </div>
    <div class="modal-stat" id="modal-stat"></div>
    <div class="modal-direction">
      <span>◀ 1塁側（Sec.307）</span>
      <span>外野側（Sec.304） ▶</span>
    </div>
    <div class="modal-blocks-outer" id="modal-blocks-outer"><div class="modal-blocks" id="modal-blocks"></div></div>
    <div class="modal-legend">
      <div class="leg"><div class="leg-dot" style="background:#dbeafe;width:14px;height:12px;border-radius:3px;flex-shrink:0"></div>空席</div>
      <div class="leg"><div class="leg-dot" style="background:#dcfce7;width:14px;height:12px;border-radius:3px;flex-shrink:0"></div>自分の予約</div>
      <div class="leg"><div class="leg-dot" style="background:#e5e5e5;width:14px;height:12px;border-radius:3px;flex-shrink:0"></div>予約済み</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCrECBmxQN9Pzz721lsXDJ1nth7vxSa6SI",
  authDomain: "escon-seat-select.firebaseapp.com",
  databaseURL: "https://escon-seat-select-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "escon-seat-select",
  storageBucket: "escon-seat-select.firebasestorage.app",
  messagingSenderId: "425307440152",
  appId: "1:425307440152:web:e28fa6519c69524980ef6d"
};

const SEATS_DEF = {
  '307': { rows: [1,2,3,4,5,6], cols: 12 },
  '306': { rows: [1,3,5], cols: 12 },
  '305': { rows: [1,3,5], cols: 12 },
  '304': { rows: [1,3,5], cols: 12 },
};
const SEATS_ORDER = ['307', '306', '305', '304'];

let db = null;
let remoteState = {};
let selected = new Set();   // 新規登録用に選択中（空席）
let toDelete = new Set();   // 削除選択中（自分の席）
let currentEid = '';

// ============================================================
// ★ 締め切り日時（日本時間）— 必要に応じて変更してください
// ============================================================
const DEADLINE = new Date('2026-06-30T23:59:59+09:00');
// ============================================================

let isExpired = false;

function checkDeadline() {
  const now = new Date();
  if (now >= DEADLINE) {
    isExpired = true;
    const eidInput = document.getElementById('eid-input');
    eidInput.disabled = true;
    eidInput.placeholder = '締め切り済み';
    eidInput.style.color = '#aaa';
    eidInput.style.cursor = 'not-allowed';
    document.getElementById('name-hint').textContent = '⚠️ 応募期限を過ぎたため、登録・変更はできません。';
    document.getElementById('name-hint').style.color = '#dc2626';
    document.getElementById('register-btn').disabled = true;
    document.getElementById('delete-btn').disabled = true;
    selected.clear();
    toDelete.clear();
    updateActionArea();
    renderMap();
  }
}

checkDeadline();
setInterval(checkDeadline, 60000);

function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    listenDB();
  } catch(e) {
    document.getElementById('status-text').textContent = '接続エラー';
    document.getElementById('status-dot').style.background = '#ef4444';
  }
}

function listenDB() {
  db.ref('seats').on('value', snap => {
    remoteState = snap.val() || {};
    document.getElementById('status-text').textContent = 'リアルタイム同期中';
    renderMap();
    if (currentEid) updateEidBanner(currentEid);
  }, err => {
    document.getElementById('status-text').textContent = '接続エラー: ' + err.message;
    document.getElementById('status-dot').style.background = '#ef4444';
  });
}

function onEidInput() {
  const val = document.getElementById('eid-input').value.trim().toLowerCase();
  currentEid = val;
  selected.clear();
  toDelete.clear();
  updateEidBanner(val);
  renderMap();
  updateActionArea();
}

function updateEidBanner(eid) {
  const myKeys = Object.entries(remoteState)
    .filter(([, info]) => info && info.eid === eid)
    .map(([k]) => k)
    .sort((a, b) => {
      const [as,ar,ac] = a.split('-'); const [bs,br,bc] = b.split('-');
      return as.localeCompare(bs) || +ar - +br || +ac - +bc;
    });

  const banner = document.getElementById('eid-banner');
  if (eid && myKeys.length > 0) {
    const labels = myKeys.map(k => {
      const [s,r,c] = k.split('-');
      return `Sec.${s} ${r}列${c}番`;
    });
    document.getElementById('eid-banner-text').textContent =
      `予約済み：${labels.join('　')}`;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function reserve() {
  if (!currentEid) { showToast('eidを入力してください'); return; }
  if (selected.size === 0) return;

  const keys = [...selected];
  const ts = Date.now();
  const failed = [];

  const transactions = keys.map(key =>
    db.ref('seats/' + key).transaction(current => {
      if (current !== null) {
        failed.push(key);
        return; // abort
      }
      return { eid: currentEid, ts };
    })
  );

  Promise.all(transactions).then(() => {
    selected.clear();
    updateActionArea();
    if (failed.length === 0) {
      showToast('登録しました！');
    } else if (failed.length === keys.length) {
      showToast('選択した席はすでに予約済みです');
    } else {
      const labels = failed.map(k => {
        const [s,r,c] = k.split('-');
        return `Sec.${s} ${r}列${c}番`;
      });
      showToast(`一部登録済みの席がありました：${labels.join('、')}`);
    }
  }).catch(() => showToast('エラーが発生しました'));
}

function deleteSelected() {
  if (toDelete.size === 0) return;
  const promises = [...toDelete].map(key => db.ref('seats/' + key).remove());
  Promise.all(promises).then(() => {
    toDelete.clear();
    updateActionArea();
    showToast('削除しました');
  }).catch(() => showToast('エラーが発生しました'));
}

function renderMap() {
  const wrap = document.getElementById('map-inner');
  wrap.innerHTML = '';

  SEATS_ORDER.forEach((sec, idx, arr) => {
    const { rows, cols } = SEATS_DEF[sec];
    const block = document.createElement('div');
    block.className = 'sec-block';

    const lbl = document.createElement('div');
    lbl.className = 'sec-label';
    lbl.textContent = 'Sec.' + sec;
    block.appendChild(lbl);

    const rw = document.createElement('div');
    rw.className = 'rows-wrap';

    rows.forEach(r => {
      const line = document.createElement('div');
      line.className = 'row-line';

      const tag = document.createElement('div');
      tag.className = 'row-tag';
      tag.textContent = r + '列';
      line.appendChild(tag);

      const seatsEl = document.createElement('div');
      seatsEl.className = 'seats';

      for (let c = 1; c <= cols; c++) {
        const key = `${sec}-${r}-${c}`;
        const info = remoteState[key];
        const btn = document.createElement('button');
        btn.textContent = c;

        if (info) {
          // 予約済み
          btn.title = `Sec.${sec} ${r}列 ${c}番 — ${info.eid}`;
          if (currentEid && info.eid === currentEid) {
            // 自分の席
            if (toDelete.has(key)) {
              btn.className = 'seat to-delete';
            } else {
              btn.className = 'seat mine';
            }
            if (!isExpired) {
              btn.onclick = (() => {
                const k = key;
                return () => {
                  if (toDelete.has(k)) {
                    toDelete.delete(k);
                  } else {
                    toDelete.add(k);
                  }
                  renderMap();
                  updateActionArea();
                };
              })();
            }
          } else {
            // 他人の席
            btn.className = 'seat taken';
          }
        } else {
          // 空席
          btn.title = `Sec.${sec} ${r}列 ${c}番 — 空席`;
          if (selected.has(key)) {
            btn.className = 'seat selected';
          } else {
            btn.className = 'seat avail';
          }
          if (!isExpired) {
            btn.onclick = (() => {
              const k = key;
              return () => {
                if (!currentEid) { showToast('先にeidを入力してください'); return; }
                if (selected.has(k)) {
                  selected.delete(k);
                } else {
                  selected.add(k);
                }
                renderMap();
                updateActionArea();
              };
            })();
          } else {
            btn.style.cursor = 'not-allowed';
          }
        }

        seatsEl.appendChild(btn);
      }

      line.appendChild(seatsEl);
      rw.appendChild(line);
    });

    block.appendChild(rw);
    wrap.appendChild(block);

    if (idx < arr.length - 1) {
      const div = document.createElement('div');
      div.className = 'sec-divider';
      wrap.appendChild(div);
    }
  });
}

function updateActionArea() {
  const box = document.getElementById('sel-info');
  const registerBtn = document.getElementById('register-btn');
  const deleteBtn = document.getElementById('delete-btn');

  const hasNew = selected.size > 0;
  const hasDel = toDelete.size > 0;

  if (!hasNew && !hasDel) {
    box.textContent = '席をクリックして選択してください（複数選択可）';
    box.className = 'sel-info';
    registerBtn.disabled = true;
    deleteBtn.classList.remove('show');
    return;
  }

  let html = '';

  if (hasNew) {
    const sorted = [...selected].sort((a,b) => {
      const [as,ar,ac]=a.split('-'); const [bs,br,bc]=b.split('-');
      return as.localeCompare(bs)||+ar-+br||+ac-+bc;
    });
    const labels = sorted.map(k => { const [s,r,c]=k.split('-'); return `Sec.${s} ${r}列${c}番`; });
    html += `<div class="sel-count">登録選択中 ${selected.size}席</div>${labels.join('　')}`;
  }

  if (hasDel) {
    const sorted = [...toDelete].sort((a,b) => {
      const [as,ar,ac]=a.split('-'); const [bs,br,bc]=b.split('-');
      return as.localeCompare(bs)||+ar-+br||+ac-+bc;
    });
    const labels = sorted.map(k => { const [s,r,c]=k.split('-'); return `Sec.${s} ${r}列${c}番`; });
    html += `${hasNew ? '<br>' : ''}<div class="sel-count" style="color:#dc2626;margin-top:${hasNew?'8px':'0'}">削除選択中 ${toDelete.size}席</div><span style="color:#dc2626">${labels.join('　')}</span>`;
  }

  box.innerHTML = html;
  box.className = 'sel-info has-sel';
  registerBtn.disabled = !hasNew;
  if (hasDel) {
    deleteBtn.classList.add('show');
    deleteBtn.disabled = false;
  } else {
    deleteBtn.classList.remove('show');
  }
}

function openOverview() {
  renderOverview();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeOverview() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeOverviewOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeOverview();
}

function renderOverview() {
  const wrap = document.getElementById('modal-blocks');
  wrap.innerHTML = '';
  const takenSeats = Object.values(remoteState).filter(v => v).length;
  document.getElementById('modal-stat').innerHTML =
    `<strong>${takenSeats}</strong> / 180席 予約済み　空席 <strong>${180 - takenSeats}</strong>席`;

  SEATS_ORDER.forEach((sec, idx, arr) => {
    const { rows, cols } = SEATS_DEF[sec];
    const secEl = document.createElement('div');
    secEl.className = 'modal-sec';
    const lbl = document.createElement('div');
    lbl.className = 'modal-sec-label';
    lbl.textContent = 'Sec.' + sec;
    secEl.appendChild(lbl);
    const rowsEl = document.createElement('div');
    rowsEl.className = 'modal-rows';
    rows.forEach(r => {
      const rowEl = document.createElement('div');
      rowEl.className = 'modal-row';
      const tag = document.createElement('div');
      tag.className = 'modal-row-tag';
      tag.textContent = r + '列';
      rowEl.appendChild(tag);
      const seatsEl = document.createElement('div');
      seatsEl.className = 'modal-seats';
      for (let c = 1; c <= cols; c++) {
        const key = `${sec}-${r}-${c}`;
        const info = remoteState[key];
        const seatWrap = document.createElement('div');
        seatWrap.className = 'modal-seat';
        const box = document.createElement('div');
        box.textContent = c;
        const eidEl = document.createElement('div');
        eidEl.className = 'modal-eid';
        if (info) {
          box.className = (currentEid && info.eid === currentEid) ? 'modal-seat-box mine' : 'modal-seat-box taken';
          const shortEid = info.eid.split('@')[0].split('.').map((s,i) => i===0 ? s : s[0]).join('.');
          eidEl.textContent = shortEid;
          eidEl.title = info.eid;
        } else {
          box.className = 'modal-seat-box avail';
          eidEl.textContent = '';
        }
        seatWrap.appendChild(box);
        seatWrap.appendChild(eidEl);
        seatsEl.appendChild(seatWrap);
      }
      rowEl.appendChild(seatsEl);
      rowsEl.appendChild(rowEl);
    });
    secEl.appendChild(rowsEl);
    wrap.appendChild(secEl);
    if (idx < arr.length - 1) {
      const div = document.createElement('div');
      div.style.cssText = 'width:1px;background:rgba(0,0,0,0.08);margin-top:18px;flex-shrink:0';
      wrap.appendChild(div);
    }
  });

  requestAnimationFrame(() => {
    const outer = document.getElementById('modal-blocks-outer');
    const inner = document.getElementById('modal-blocks');
    const outerW = outer.clientWidth;
    const innerW = inner.scrollWidth;
    const scale = innerW > outerW ? outerW / innerW : 1;
    inner.style.transform = `scale(${scale})`;
    inner.style.height = `${inner.scrollHeight * scale}px`;
    const modal = document.getElementById('modal');
    const maxH = window.innerHeight * 0.92;
    if (modal.scrollHeight > maxH) {
      const contentH = modal.scrollHeight - inner.scrollHeight + inner.scrollHeight * scale;
      const scaleAll = maxH / contentH;
      if (scaleAll < 1) {
        const finalScale = scale * scaleAll;
        inner.style.transform = `scale(${finalScale})`;
        inner.style.height = `${inner.scrollHeight * finalScale}px`;
      }
    }
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

initFirebase();
</script>
